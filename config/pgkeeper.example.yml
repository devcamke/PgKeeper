# PgKeeper example configuration.
#
# Copy to pgkeeper.yml (or config/pgkeeper.yml) and edit. Secrets should come
# from the environment via ERB interpolation — never commit real passwords.
#
#   export PGKEEPER_APP_PASSWORD=...
#   pgkeeper doctor -c pgkeeper.yml
#   pgkeeper backup -c pgkeeper.yml

# Where PgKeeper stages work and (by default) keeps local backups.
workdir: /var/backups/pgkeeper

# When to run backups. Accepts cron ("15 3 * * *"), natural language
# ("every day at 03:15", "every monday at 9am"), or shorthands
# ("hourly", "daily at 03:15", "weekly on sunday at 04:00"). A per-database
# `schedule:` overrides this for that database. Drive it with cron/systemd via
# `pgkeeper schedule install`, or run `pgkeeper daemon` in a container.
schedule: daily at 03:15

# Settings applied to every database unless the database overrides them.
defaults:
  host: localhost
  port: 5432
  username: backup_user
  format: custom          # custom | plain | directory
  include_globals: true   # also capture roles/tablespaces via pg_dumpall

databases:
  - name: app_production
    database: app_production
    password: <%= ENV["PGKEEPER_APP_PASSWORD"] %>
    include_globals: true

  - name: analytics
    database: analytics
    format: directory       # enables parallel dump/restore for large DBs
    exclude_tables:
      - events_raw           # skip a huge, reproducible table
    password: <%= ENV["PGKEEPER_ANALYTICS_PASSWORD"] %>

# Compression of the artifact: none | gzip | zip | zstd.
# `custom`/`directory` dumps are already compressed by pg_dump, so external
# compression is skipped for them automatically. `zstd` requires the zstd
# binary on PATH.
compression: gzip

# Encryption at rest, applied before anything ships to third-party clouds.
# type: aes256gcm (built in, OpenSSL) or gpg (shells out to gpg).
# Provide the key via `passphrase_env` (an env var name) or a `keyfile`.
encryption:
  enabled: false
  type: aes256gcm
  passphrase_env: PGKEEPER_ENCRYPTION_PASSPHRASE

# Backup destinations. Every run fans out to all of them; each is tracked
# independently, so one cloud being down never fails the local copy.
storage:
  - type: local
    path: /var/backups/pgkeeper/backups

  # S3-compatible object storage (AWS S3, MinIO, Backblaze B2, Cloudflare R2,
  # DigitalOcean Spaces). Requires the aws-sdk-s3 gem. Credentials come from the
  # environment / instance profile by default; set an `endpoint` for non-AWS.
  # - type: s3
  #   bucket: my-pgkeeper-backups
  #   region: us-east-1
  #   prefix: production
  #   # endpoint: https://s3.us-west-000.backblazeb2.com
  #   # force_path_style: true   # needed by MinIO and some S3-compatibles
  #   access_key_id: <%= ENV["AWS_ACCESS_KEY_ID"] %>
  #   secret_access_key: <%= ENV["AWS_SECRET_ACCESS_KEY"] %>

  # Dropbox (no gem required). Large files stream through an upload session, so
  # dumps above Dropbox's 150 MB single-request limit upload fine. Use a
  # refresh-token triple (durable) or a long-lived `access_token`. See
  # docs/PROVIDERS.md#dropbox for creating the app and minting the token.
  # - type: dropbox
  #   root: /pgkeeper            # folder prefix; omit for the app root
  #   refresh_token: <%= ENV["DROPBOX_REFRESH_TOKEN"] %>
  #   app_key: <%= ENV["DROPBOX_APP_KEY"] %>
  #   app_secret: <%= ENV["DROPBOX_APP_SECRET"] %>

  # Google Drive (no gem required). Backups land in one folder shared with a
  # service account; large files stream through a resumable session. See
  # docs/PROVIDERS.md#google-drive for the service-account + folder setup.
  # - type: google_drive
  #   folder_id: <%= ENV["GDRIVE_FOLDER_ID"] %>
  #   credentials_file: /etc/pgkeeper/service-account.json
  #   # credentials_json: <%= ENV["GDRIVE_SERVICE_ACCOUNT_JSON"] %>   # inline alternative

  # SharePoint / OneDrive via Microsoft Graph (no gem required). Backups land in
  # one drive (`drive_id`); large files stream through a Graph upload session.
  # See docs/PROVIDERS.md#sharepoint--onedrive for the app registration + drive.
  # - type: sharepoint
  #   drive_id: <%= ENV["GRAPH_DRIVE_ID"] %>
  #   tenant_id: <%= ENV["AZURE_TENANT_ID"] %>
  #   client_id: <%= ENV["AZURE_CLIENT_ID"] %>
  #   client_secret: <%= ENV["AZURE_CLIENT_SECRET"] %>
  #   root: pgkeeper            # optional folder prefix within the drive

# Wall-clock deadlines (seconds) for the external tools PgKeeper shells out to.
# Defaults are generous enough never to trip a legitimate operation but finite,
# so a genuinely hung child (a lock wait, a stalled network mount, a server that
# accepts the connection but never answers) can't block a run forever with no
# backup and no failure alert. Set any value to 0 to disable that deadline.
# timeouts:
#   dump: 21600      # pg_dump / pg_dumpall (default 6h)
#   restore: 21600   # pg_restore / psql restore (default 6h)
#   verify: 3600     # deep-verify restore into a scratch database (default 1h)
#   query: 60        # short metadata queries: size estimate, guards, SHOW

# Backup-size anomaly detection. A dump that is suddenly far smaller than its
# recent history is the classic sign of a silently broken backup (a dropped
# table, a bad exclude, a truncated database) — pg_dump still exits 0, so
# nothing else catches it. When a fresh dump moves past the threshold vs the
# median of recent successful runs, PgKeeper logs a loud warning and includes it
# in the run's notification (the run still succeeds; this is advisory).
# anomaly:
#   enabled: true
#   min_samples: 2     # need at least this many prior successful runs to judge
#   sample_size: 5     # baseline is the median of the last N successful runs
#   shrink_pct: 50     # warn when today's dump is >= this % smaller than baseline
#   grow_pct: 0        # warn when it is this % larger (0 disables growth warnings)

# Retention policy, enforced per destination. (Phase 5.)
retention:
  keep_daily: 7
  keep_weekly: 4
  keep_monthly: 6

# Notifications. Failure alerts are strongly recommended. Each notifier fires
# only for the events listed under its `on:`; a run counts as "success" only
# when every database reached every destination.
notifications:
  email:
    to:
      - ops@example.com
    from: pgkeeper@example.com
    on: [failure]              # add `success` for per-run success mails
    smtp:
      host: smtp.example.com
      port: 587
      user_name: pgkeeper
      password: <%= ENV["PGKEEPER_SMTP_PASSWORD"] %>

  # Generic JSON webhook (Slack/Teams/Discord/custom). Set `format: slack` for a
  # chat-friendly message instead of the full JSON payload.
  # webhook:
  #   url: <%= ENV["PGKEEPER_WEBHOOK_URL"] %>
  #   format: slack
  #   on: [success, failure]

  # Dead-man's switch: pings this URL on success so a monitor (healthchecks.io,
  # Uptime Kuma, Cronitor, ...) alarms when a scheduled run silently never runs.
  # healthcheck:
  #   url: <%= ENV["PGKEEPER_HEALTHCHECK_URL"] %>
  #   # fail_url: <%= ENV["PGKEEPER_HEALTHCHECK_FAIL_URL"] %>  # also ping on failure

# Optional web dashboard (`pgkeeper web`): backup health, run history,
# retention preview, and management actions in a browser. Requires the rack
# and puma gems (`gem install rack puma`; the Docker image includes them).
# Auth is mandatory — the dashboard refuses to start without it. Browsers log
# in with basic auth (any username, the token as password); scripts use
# `Authorization: Bearer <token>`. Binds to loopback by default; put a
# TLS-terminating reverse proxy in front for remote access.
# web:
#   bind: 127.0.0.1
#   port: 8321
#   auth:
#     token: <%= ENV["PGKEEPER_WEB_TOKEN"] %>
#     # ... or basic-auth credentials instead of a token:
#     # username: ops
#     # password: <%= ENV["PGKEEPER_WEB_PASSWORD"] %>
