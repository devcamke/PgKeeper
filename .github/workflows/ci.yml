name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Weekly run so a dependency CVE disclosed between commits is still caught by
  # the security job rather than lying dormant until the next push.
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      - name: Verify pinned Ruby (3.3.6)
        run: |
          v=$(mise exec -- ruby -e 'print RUBY_VERSION')
          echo "Ruby version: $v"
          [ "$v" = "3.3.6" ] || { echo "expected Ruby 3.3.6, got $v"; exit 1; }
      - name: Install dependencies
        run: mise exec -- bundle install
      - name: RuboCop
        run: mise exec -- bundle exec rake lint
      - name: Build gem (packaging sanity)
        run: mise exec -- gem build pgkeeper.gemspec

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      - name: Install dependencies
        run: mise exec -- bundle install
      - name: Audit dependencies for known CVEs (bundler-audit)
        run: |
          mise exec -- gem install bundler-audit
          mise exec -- bundle-audit check --update

  # Runs only on PRs: flags a newly-added/updated dependency that has a known
  # vulnerability or a disallowed license, using GitHub's dependency graph.
  #
  # continue-on-error: the action hard-errors ("Dependency review is not
  # supported on this repository") whenever the repo's Dependency graph is
  # turned off, which would otherwise fail the check on every PR for a reason
  # unrelated to the diff. CVE gating is already enforced hard by the `security`
  # job (bundler-audit), so a graph outage here degrades to a warning instead of
  # blocking. Re-enable hard failures by removing continue-on-error once
  # Dependency graph is confirmed on:
  #   https://github.com/devcamke/PgKeeper/settings/security_analysis
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: high

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pgkeeper
          POSTGRES_PASSWORD: pgkeeper
          POSTGRES_DB: pgkeeper_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pgkeeper"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Integration tests connect here; the postgresql-client provides pg_dump.
      PGKEEPER_TEST_PGHOST: localhost
      PGKEEPER_TEST_PGPORT: "5432"
      PGKEEPER_TEST_PGUSER: pgkeeper
      PGKEEPER_TEST_PGPASSWORD: pgkeeper
      PGKEEPER_TEST_PGDATABASE: pgkeeper_test
    steps:
      - uses: actions/checkout@v7
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      - name: Verify pinned Ruby (3.3.6)
        run: |
          v=$(mise exec -- ruby -e 'print RUBY_VERSION')
          echo "Ruby version: $v"
          [ "$v" = "3.3.6" ] || { echo "expected Ruby 3.3.6, got $v"; exit 1; }
      - name: Install dependencies
        run: mise exec -- bundle install
      - name: Run tests
        run: mise exec -- bundle exec rake test

  # The gemspec declares `required_ruby_version >= 3.2`; the main test job pins
  # one version, so this matrix proves the hermetic unit suite actually runs on
  # every supported Ruby. No Postgres service here — the integration tests skip
  # without PGKEEPER_TEST_PGHOST, keeping this job fast.
  compat:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run unit tests
        run: bundle exec rake test:unit
